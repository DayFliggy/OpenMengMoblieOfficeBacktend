<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关于公司搬迁新办公地址的通知</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 16px; line-height: 1.8; color: #333; }
    h2 { color: #1a1a1a; font-size: 18px; }
    p { font-size: 15px; margin-bottom: 12px; }
    .highlight { color: #4749a1; font-weight: bold; }
  </style>
</head>
<body>
  <h2>关于公司搬迁新办公地址的通知</h2>
  <p>公司各部门及全体员工：</p>
  <p>因公司业务发展需要，公司将于近期搬迁至新的办公地址。现将有关事项通知如下：</p>
  <p>一、新办公地址：<span class="highlight">科技园区A栋18楼</span></p>
  <p>二、搬迁时间：2024年4月1日至4月3日</p>
  <p>三、搬迁期间各部门职责：</p>
  <p>1. 行政部负责整体搬迁协调工作；</p>
  <p>2. IT部门负责网络、电话等设备的迁移和调试；</p>
  <p>3. 各部门负责本部门文件资料和办公用品的打包整理。</p>
  <p>四、搬迁期间如需加班，公司将按照相关规定支付加班费。</p>
  <p>请各部门积极配合，确保搬迁工作顺利进行。如有疑问，请联系行政部。</p>
  <p style="text-align: right;">行政部</p>
  <p style="text-align: right;">2024年3月15日</p>
</body>
</html>
