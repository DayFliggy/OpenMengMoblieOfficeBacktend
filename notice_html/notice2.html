<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>关于开展年度员工体检的通知</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 16px; line-height: 1.8; color: #333; }
    h2 { color: #1a1a1a; font-size: 18px; }
    p { font-size: 15px; margin-bottom: 12px; }
    .highlight { color: #4749a1; font-weight: bold; }
  </style>
</head>
<body>
  <h2>关于开展年度员工体检的通知</h2>
  <p>公司各部门：</p>
  <p>为关心员工身体健康，公司决定开展2024年度员工健康体检工作。现将有关事项通知如下：</p>
  <p>一、体检时间：<span class="highlight">2024年3月1日至2024年3月31日</span></p>
  <p>二、体检地点：市第一人民医院体检中心（门诊楼三楼）</p>
  <p>三、体检范围：公司全体在职员工</p>
  <p>四、注意事项：</p>
  <p>1. 体检前一天请保持清淡饮食，避免饮酒；</p>
  <p>2. 体检当天请空腹前来，携带身份证和工作证；</p>
  <p>3. 请各部门合理安排工作，确保员工按时参加体检。</p>
  <p>请各部门于2月25日前将参加体检的员工名单报至人事部。</p>
  <p style="text-align: right;">人事部</p>
  <p style="text-align: right;">2024年2月1日</p>
</body>
</html>
